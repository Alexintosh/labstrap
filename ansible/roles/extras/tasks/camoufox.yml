---
- name: Ensure system dependencies for camoufox are present
  ansible.builtin.apt:
    name:
      - build-essential
      - libgtk-3-0
      - libx11-xcb1
      - libasound2
      - python3-pip
      - python3-venv
    state: present
    update_cache: true

- name: Ensure local user bin directory exists for camoufox
  ansible.builtin.file:
    path: "{{ labstrap_user_home }}/.local/bin"
    state: directory
    owner: "{{ user }}"
    group: "{{ user }}"
    mode: "0755"

- name: Ensure pip tooling is up to date inside camoufox virtualenv
  ansible.builtin.pip:
    name:
      - pip
      - setuptools
      - wheel
    state: present
    virtualenv: "{{ labstrap_user_home }}/.venvs/camoufox"
    virtualenv_command: python3 -m venv
  become_user: "{{ user }}"
  environment:
    HOME: "{{ labstrap_user_home }}"

- name: Install camoufox in dedicated virtualenv
  ansible.builtin.pip:
    name: "camoufox[geoip]"
    state: present
    virtualenv: "{{ labstrap_user_home }}/.venvs/camoufox"
    virtualenv_command: python3 -m venv
  become_user: "{{ user }}"
  environment:
    HOME: "{{ labstrap_user_home }}"

- name: Ensure camoufox CLI wrapper exists
  ansible.builtin.copy:
    dest: "{{ labstrap_user_home }}/.local/bin/camoufox"
    owner: "{{ user }}"
    group: "{{ user }}"
    mode: "0755"
    content: |
      #!/usr/bin/env bash
      exec "$HOME/.venvs/camoufox/bin/python" -m camoufox "$@"

- name: Ensure local user bin path is exported in .zshrc for camoufox
  ansible.builtin.lineinfile:
    path: "{{ item }}"
    line: 'export PATH="$HOME/.local/bin:$PATH"'
    state: present
    create: true
    owner: "{{ user }}"
    group: "{{ user }}"
    mode: "0644"
  loop:
    - "{{ labstrap_user_home }}/.zshrc"
    - "{{ labstrap_user_home }}/.bashrc"
    - "{{ labstrap_user_home }}/.profile"

- name: Fetch camoufox browser assets when missing
  ansible.builtin.shell: |
    set -euo pipefail
    if "${HOME}/.venvs/camoufox/bin/python" -m camoufox path >/dev/null 2>&1; then
      echo "present"
    else
      "${HOME}/.venvs/camoufox/bin/python" -m camoufox fetch
      echo "installed"
    fi
  args:
    executable: /bin/bash
  register: camoufox_fetch
  changed_when: "'installed' in (camoufox_fetch.stdout | default(''))"
  become_user: "{{ user }}"
  environment:
    HOME: "{{ labstrap_user_home }}"
  retries: 3
  delay: 5
  until: camoufox_fetch.rc == 0

- name: Verify camoufox virtualenv module exists
  ansible.builtin.stat:
    path: "{{ labstrap_user_home }}/.venvs/camoufox/bin/python"
  register: camoufox_python

- name: Fail when camoufox virtualenv is missing
  ansible.builtin.fail:
    msg: >-
      Camoufox installation did not create {{ labstrap_user_home }}/.venvs/camoufox.
      Check pip output and rerun: sudo labstrap extras camoufox
  when: not camoufox_python.stat.exists
