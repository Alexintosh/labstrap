---
- name: Prepare npm globals for pnpm
  ansible.builtin.include_tasks: npm_globals_base.yml

- name: Install pnpm
  ansible.builtin.shell: |
    set -euo pipefail
    export NVM_DIR="${HOME}/.nvm"
    . "${NVM_DIR}/nvm.sh"
    export NPM_CONFIG_PREFIX="${HOME}/.npm-global"
    export npm_config_prefix="${HOME}/.npm-global"
    if "${HOME}/.npm-global/bin/pnpm" --version >/dev/null 2>&1; then
      echo "present"
    else
      npm install -g pnpm
      echo "installed"
    fi
  args:
    executable: /bin/bash
  register: pnpm_install
  changed_when: "'installed' in (pnpm_install.stdout | default(''))"
  become_user: "{{ user }}"
  environment:
    HOME: "{{ labstrap_user_home }}"
