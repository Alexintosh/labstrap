---
- name: Ensure rustup prerequisites are present
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gcc
    state: present
    update_cache: true

- name: Install Rust toolchain (cargo)
  ansible.builtin.shell: |
    set -euo pipefail
    if [ -x "${HOME}/.cargo/bin/cargo" ]; then
      echo "present"
    else
      curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
      echo "installed"
    fi
  args:
    executable: /bin/bash
  register: cargo_install
  changed_when: "'installed' in (cargo_install.stdout | default(''))"
  become_user: "{{ user }}"
  environment:
    HOME: "{{ labstrap_user_home }}"

- name: Ensure cargo bin path is exported in .zshrc
  ansible.builtin.lineinfile:
    path: "{{ labstrap_user_home }}/.zshrc"
    line: 'export PATH="$HOME/.cargo/bin:$PATH"'
    state: present
    create: true
    owner: "{{ user }}"
    group: "{{ user }}"
    mode: "0644"
