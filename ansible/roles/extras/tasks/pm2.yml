---
- name: Prepare npm globals for pm2
  ansible.builtin.include_tasks: npm_globals_base.yml

- name: Install pm2
  ansible.builtin.shell: |
    set -euo pipefail
    export NVM_DIR="${HOME}/.nvm"
    . "${NVM_DIR}/nvm.sh"
    if "${HOME}/.npm-global/bin/pm2" --version >/dev/null 2>&1; then
      echo "present"
    else
      npm install -g pm2
      echo "installed"
    fi
  args:
    executable: /bin/bash
  register: pm2_install
  changed_when: "'installed' in (pm2_install.stdout | default(''))"
  become_user: "{{ user }}"
  environment:
    HOME: "{{ labstrap_user_home }}"
