---
- name: Prepare npm globals for tsx
  ansible.builtin.include_tasks: npm_globals_base.yml

- name: Install tsx
  ansible.builtin.shell: |
    set -euo pipefail
    export NVM_DIR="${HOME}/.nvm"
    . "${NVM_DIR}/nvm.sh"
    export NPM_CONFIG_PREFIX="${HOME}/.npm-global"
    export npm_config_prefix="${HOME}/.npm-global"
    npm config set prefix "${HOME}/.npm-global" >/dev/null
    if "${HOME}/.npm-global/bin/tsx" --version >/dev/null 2>&1; then
      echo "present"
    else
      npm install -g tsx
      echo "installed"
    fi
  args:
    executable: /bin/bash
  register: tsx_install
  changed_when: "'installed' in (tsx_install.stdout | default(''))"
  become_user: "{{ user }}"
  environment:
    HOME: "{{ labstrap_user_home }}"

- name: Ensure tsx wrapper exists in local user bin
  ansible.builtin.copy:
    dest: "{{ labstrap_user_home }}/.local/bin/tsx"
    owner: "{{ user }}"
    group: "{{ user }}"
    mode: "0755"
    content: |
      #!/usr/bin/env bash
      exec "$HOME/.npm-global/bin/tsx" "$@"

- name: Verify tsx binary exists
  ansible.builtin.stat:
    path: "{{ labstrap_user_home }}/.npm-global/bin/tsx"
  register: tsx_binary

- name: Fail when tsx binary is missing
  ansible.builtin.fail:
    msg: >-
      tsx installation finished without producing {{ labstrap_user_home }}/.npm-global/bin/tsx.
      Check npm logs and rerun: sudo labstrap extras tsx
  when: not tsx_binary.stat.exists
