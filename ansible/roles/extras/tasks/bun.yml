---
- name: Install bun in user space
  ansible.builtin.shell: |
    set -euo pipefail
    curl -fsSL https://bun.sh/install | bash
  args:
    executable: /bin/bash
    creates: "{{ labstrap_user_home }}/.bun/bin/bun"
  become_user: "{{ user }}"
  environment:
    HOME: "{{ labstrap_user_home }}"

- name: Ensure bun install location is defined in shell rc files
  ansible.builtin.lineinfile:
    path: "{{ item }}"
    line: 'export BUN_INSTALL="$HOME/.bun"'
    state: present
    create: true
    owner: "{{ user }}"
    group: "{{ user }}"
    mode: "0644"
  loop:
    - "{{ labstrap_user_home }}/.zshrc"
    - "{{ labstrap_user_home }}/.bashrc"
    - "{{ labstrap_user_home }}/.profile"

- name: Ensure bun path is in shell rc files
  ansible.builtin.lineinfile:
    path: "{{ item }}"
    line: 'export PATH="$BUN_INSTALL/bin:$PATH"'
    state: present
    create: true
    owner: "{{ user }}"
    group: "{{ user }}"
    mode: "0644"
  loop:
    - "{{ labstrap_user_home }}/.zshrc"
    - "{{ labstrap_user_home }}/.bashrc"
    - "{{ labstrap_user_home }}/.profile"

- name: Ensure local user bin directory exists for bun wrapper
  ansible.builtin.file:
    path: "{{ labstrap_user_home }}/.local/bin"
    state: directory
    owner: "{{ user }}"
    group: "{{ user }}"
    mode: "0755"

- name: Ensure bun wrapper exists in local user bin
  ansible.builtin.copy:
    dest: "{{ labstrap_user_home }}/.local/bin/bun"
    owner: "{{ user }}"
    group: "{{ user }}"
    mode: "0755"
    content: |
      #!/usr/bin/env bash
      exec "$HOME/.bun/bin/bun" "$@"

- name: Verify bun binary exists
  ansible.builtin.stat:
    path: "{{ labstrap_user_home }}/.bun/bin/bun"
  register: bun_binary

- name: Fail when bun binary is missing
  ansible.builtin.fail:
    msg: >-
      bun installation finished without producing {{ labstrap_user_home }}/.bun/bin/bun.
      Check installer output and rerun: sudo labstrap extras bun
  when: not bun_binary.stat.exists
