---
- name: Ensure local binary directory exists
  ansible.builtin.file:
    path: "{{ labstrap_user_home }}/.local/bin"
    state: directory
    owner: "{{ user }}"
    group: "{{ user }}"
    mode: "0755"

- name: Install starship binary
  ansible.builtin.shell: |
    set -euo pipefail
    curl -fsSL https://starship.rs/install.sh | sh -s -- -y -b "${HOME}/.local/bin"
  args:
    executable: /bin/bash
    creates: "{{ labstrap_user_home }}/.local/bin/starship"
  become_user: "{{ user }}"
  environment:
    HOME: "{{ labstrap_user_home }}"

- name: Ensure local user bin path is exported for starship
  ansible.builtin.lineinfile:
    path: "{{ item }}"
    line: 'export PATH="$HOME/.local/bin:$PATH"'
    state: present
    create: true
    owner: "{{ user }}"
    group: "{{ user }}"
    mode: "0644"
  loop:
    - "{{ labstrap_user_home }}/.zshrc"
    - "{{ labstrap_user_home }}/.bashrc"
    - "{{ labstrap_user_home }}/.profile"

- name: Enable starship in .zshrc
  ansible.builtin.lineinfile:
    path: "{{ labstrap_user_home }}/.zshrc"
    line: 'eval "$(starship init zsh)"'
    state: present
    create: true
    owner: "{{ user }}"
    group: "{{ user }}"
    mode: "0644"

- name: Enable starship in .bashrc
  ansible.builtin.lineinfile:
    path: "{{ labstrap_user_home }}/.bashrc"
    line: 'eval "$(starship init bash)"'
    state: present
    create: true
    owner: "{{ user }}"
    group: "{{ user }}"
    mode: "0644"

- name: Verify starship binary exists
  ansible.builtin.stat:
    path: "{{ labstrap_user_home }}/.local/bin/starship"
  register: starship_binary

- name: Fail when starship binary is missing
  ansible.builtin.fail:
    msg: >-
      Starship installation finished without producing {{ labstrap_user_home }}/.local/bin/starship.
      Check installer output and rerun: sudo labstrap extras starship
  when: not starship_binary.stat.exists
