---
- name: Prepare npm globals for tcs
  ansible.builtin.include_tasks: npm_globals_base.yml

- name: Install TypeScript compiler (tsc)
  ansible.builtin.shell: |
    set -euo pipefail
    export NVM_DIR="${HOME}/.nvm"
    . "${NVM_DIR}/nvm.sh"
    if "${HOME}/.npm-global/bin/tsc" --version >/dev/null 2>&1; then
      echo "present"
    else
      npm install -g typescript
      echo "installed"
    fi
  args:
    executable: /bin/bash
  register: tsc_install
  changed_when: "'installed' in (tsc_install.stdout | default(''))"
  become_user: "{{ user }}"
  environment:
    HOME: "{{ labstrap_user_home }}"

- name: Ensure local user bin directory exists for tcs shim
  ansible.builtin.file:
    path: "{{ labstrap_user_home }}/.local/bin"
    state: directory
    owner: "{{ user }}"
    group: "{{ user }}"
    mode: "0755"

- name: Install tcs wrapper that delegates to tsc
  ansible.builtin.copy:
    dest: "{{ labstrap_user_home }}/.local/bin/tcs"
    owner: "{{ user }}"
    group: "{{ user }}"
    mode: "0755"
    content: |
      #!/usr/bin/env bash
      exec "$HOME/.npm-global/bin/tsc" "$@"

- name: Ensure local user bin path is exported in .zshrc for tcs
  ansible.builtin.lineinfile:
    path: "{{ labstrap_user_home }}/.zshrc"
    line: 'export PATH="$HOME/.local/bin:$PATH"'
    state: present
    create: true
    owner: "{{ user }}"
    group: "{{ user }}"
    mode: "0644"
