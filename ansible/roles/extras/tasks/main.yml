---
- name: Define extras component metadata
  ansible.builtin.set_fact:
    valid_extras_components:
      - all
      - homebrew
      - dokploy
      - zsh
      - ohmyzsh
      - starship
      - yazi
      - node
      - codex
      - claudecode
      - kimi
      - camoufox
      - cargo
      - pm2
      - pnpm
      - tcs
      - tsx
      - openclaw
      - clawvault
      - bun
      - whisper
      - rbw
      - llamacpp
      - herdr
      - dotfiles
    selectable_extras_components:
      - homebrew
      - dokploy
      - zsh
      - ohmyzsh
      - starship
      - yazi
      - node
      - codex
      - claudecode
      - kimi
      - camoufox
      - cargo
      - pm2
      - pnpm
      - tcs
      - tsx
      - openclaw
      - clawvault
      - bun
      - whisper
      - rbw
      - llamacpp
      - herdr
      - dotfiles
    node_dependent_extras_components:
      - codex
      - claudecode
      - pm2
      - pnpm
      - tcs
      - tsx
      - clawvault
    homebrew_dependent_extras_components:
      - yazi
      - rbw
      - llamacpp

- name: Resolve provisioning user home directory for extras
  ansible.builtin.command: "getent passwd {{ user }}"
  register: extras_user_passwd
  changed_when: false
  failed_when: extras_user_passwd.rc != 0 or (extras_user_passwd.stdout | trim) == ''

- name: Set extras user home directory fact
  ansible.builtin.set_fact:
    labstrap_user_home: "{{ (extras_user_passwd.stdout.split(':'))[5] }}"

- name: Validate extras component selection
  ansible.builtin.assert:
    that:
      - extras_component in valid_extras_components
    fail_msg: "Invalid extras component '{{ extras_component }}'."

- name: Parse interactive extras selection override
  ansible.builtin.set_fact:
    extras_selection_override: "{{ extras_selection_override | default(false) | bool }}"
    extras_selected_list: >-
      {{
        (extras_selected_csv | default('', true) | trim)
        | split(',')
        | map('trim')
        | reject('equalto', '')
        | list
      }}

- name: Validate interactive extras selection override
  ansible.builtin.assert:
    that:
      - extras_selected_list | difference(selectable_extras_components) | length == 0
    fail_msg: "Invalid interactive extras selection '{{ extras_selected_list | to_json }}'."
  when: extras_selection_override

- name: Resolve raw extras selection for this run
  ansible.builtin.set_fact:
    extras_effective_selected_raw: >-
      {{
        extras_selected_list
        if extras_selection_override
        else (
          (extras | dict2items
           | selectattr('value', 'equalto', true)
           | map(attribute='key')
           | list)
          if extras_component == 'all'
          else ([extras_component] if (extras[extras_component] | default(false) | bool) else [])
        )
      }}

- name: Expand effective extras selection with required dependencies
  ansible.builtin.set_fact:
    extras_effective_selected: >-
      {{
        (
          extras_effective_selected_raw
          + (
            ['node']
            if (extras_effective_selected_raw | intersect(node_dependent_extras_components) | length > 0)
            else []
          )
          + (
            ['homebrew']
            if (extras_effective_selected_raw | intersect(homebrew_dependent_extras_components) | length > 0)
            else []
          )
        ) | unique
      }}

- name: Initialize extras component result trackers
  ansible.builtin.set_fact:
    extras_failed_components: []

- name: Run Homebrew component
  ansible.builtin.include_tasks: run_component.yml
  vars:
    extras_component_name: homebrew
    extras_component_task_file: homebrew.yml
  when:
    - extras_component_name in extras_effective_selected

