---
- name: Define extras component metadata
  ansible.builtin.set_fact:
    valid_extras_components:
      - all
      - homebrew
      - dokploy
      - zsh
      - ohmyzsh
      - starship
      - yazi
      - node
      - codex
      - claudecode
      - kimi
      - camoufox
      - cargo
      - pm2
      - pnpm
      - tcs
      - tsx
      - openclaw
      - clawvault
      - bun
      - whisper
      - rbw
      - dotfiles
    labstrap_user_home: "/home/{{ user }}"

- name: Validate extras component selection
  ansible.builtin.assert:
    that:
      - extras_component in valid_extras_components
    fail_msg: "Invalid extras component '{{ extras_component }}'."

- name: Run Homebrew component
  ansible.builtin.include_tasks: homebrew.yml
  when:
    - extras.homebrew | bool
    - extras_component in ['all', 'homebrew']

- name: Run zsh component
  ansible.builtin.include_tasks: zsh.yml
  when:
    - extras.zsh | bool
    - extras_component in ['all', 'zsh']

